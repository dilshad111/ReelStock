# Virtual Hosts
#
# Required modules: mod_log_config

# If you want to maintain multiple domains/hostnames on your
# machine you can setup VirtualHost containers for them. Most configurations
# use only name-based virtual hosts so the server doesn't need to worry about
# IP addresses. This is indicated by the asterisks in the directives below.
#
# Please see the documentation at 
# <URL:http://httpd.apache.org/docs/2.4/vhosts/>
# for further details before you try to setup virtual hosts.
#
# You may use the command line option '-S' to verify your virtual host
# configuration.

#
# Use name-based virtual hosting.
#
##NameVirtualHost *:80

#
# HTTP Virtual Host (Port 80)
# Automatically redirects all HTTP traffic to HTTPS on port 444
#
<VirtualHost *:80>
    ServerName 192.168.10.47
    DocumentRoot "C:/xampp/htdocs/ReelStock/public"

    # Automatic redirection to secure HTTPS
    Redirect permanent / https://192.168.10.47:444/

    <Directory "C:/xampp/htdocs/ReelStock/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost> 

#
# HTTPS Virtual Host (Port 444)
# Serves the application securely using the custom SSL certificate
#
<VirtualHost *:444>
    ServerName 192.168.10.47
    DocumentRoot "C:/xampp/htdocs/ReelStock/public"

    SSLEngine on
    SSLCertificateFile "conf/ssl.crt/server_192.crt"
    SSLCertificateKeyFile "conf/ssl.key/server_192.key"

    <Directory "C:/xampp/htdocs/ReelStock/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
